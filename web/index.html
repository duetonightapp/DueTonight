<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="DueTonight is an Academic Room Coordinator and Assignment Tracker for college students to stay organized and collaborate.">
  <meta property="og:title" content="DueTonight - Academic Room Coordinator">
  <meta property="og:description" content="Collaborate on class assignments, share study resources, and never miss a deadline.">
  <meta property="og:image" content="https://me.duetonight.app/favicon.png">
  <meta property="og:url" content="https://me.duetonight.app">
  <meta property="og:type" content="website">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="DueTonight">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>DueTonight - Academic Room Coordinator</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    // Register custom service worker that wraps Flutter's service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('sw.js').then(function(reg) {
          console.log('DueTonight custom ServiceWorker registered:', reg.scope);
        }).catch(function(err) {
          console.error('Custom ServiceWorker registration failed:', err);
        });
      });
    }

    // Web Push Notifications JS Helper
    window.dueTonightPush = {
      getPermissionStatus: function() {
        if (!('Notification' in window)) {
          return 'unsupported';
        }
        return Notification.permission; // 'default', 'granted', 'denied'
      },
      
      requestPermission: async function() {
        if (!('Notification' in window)) {
          return 'unsupported';
        }
        const permission = await Notification.requestPermission();
        return permission;
      },
      
      subscribeUser: async function(publicVapidKey) {
        if (!('serviceWorker' in navigator)) {
          throw new Error('Service worker not supported');
        }
        
        const registration = await navigator.serviceWorker.ready;
        let subscription = await registration.pushManager.getSubscription();
        
        if (!subscription) {
          subscription = await registration.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: window.dueTonightPush.urlBase64ToUint8Array(publicVapidKey)
          });
        }
        
        const rawSubscription = JSON.parse(JSON.stringify(subscription));
        return {
          endpoint: rawSubscription.endpoint,
          p256dh: rawSubscription.keys.p256dh,
          auth: rawSubscription.keys.auth
        };
      },
      
      urlBase64ToUint8Array: function(base64String) {
        const padding = '='.repeat((4 - base64String.length % 4) % 4);
        const base64 = (base64String + padding)
          .replace(/\-/g, '+')
          .replace(/_/g, '/');
        const rawData = window.atob(base64);
        const outputArray = new Uint8Array(rawData.length);
        for (let i = 0; i < rawData.length; ++i) {
          outputArray[i] = rawData.charCodeAt(i);
        }
        return outputArray;
      }
    };
  </script>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:

</body>
</html>
