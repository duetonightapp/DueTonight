name: due_tonight
description: "Assignment Tracker App for College Students"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # Supabase
  supabase_flutter: ^2.5.0
  
  # Google Sign In
  google_sign_in: ^6.2.1
  
  # State Management
  flutter_riverpod: ^2.5.1
  
  # Navigation
  go_router: ^14.2.0
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  hive_flutter: ^1.1.0
  url_launcher: ^6.2.5
  http: ^1.2.1
  dio: ^5.7.0
  file_picker: ^8.1.2
  image_picker: ^1.1.2
  syncfusion_flutter_pdfviewer: ^27.2.5
  path_provider: ^2.1.4
  open_filex: ^4.5.0
  mime: ^1.0.5
  path: ^1.9.0
  google_fonts: ^6.1.0
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.10.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/icon/icon.png

# Configuration for flutter_launcher_icons
flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"